<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Price Checker BSD ZXING FINAL</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    padding: 20px;
    background: #f8fafc;
    color: #1f2937;
}

h2 {
    margin-bottom: 20px;
}

video {
    width: 75%;
max-width: 150px;
    margin: auto;
    border-radius: 15px;
}

input {
    padding: 14px;
    width: 100%;
    max-width: 320px;
    border-radius: 14px;
    border: 1px solid #e5e7eb;
    font-size: 16px;
    margin-top: 15px;
}

button {
    padding: 12px 25px;
    margin-top: 15px;
    border-radius: 30px;
    border: none;
    background: #111827;
    color: white;
    font-weight: 500;
    cursor: pointer;
}

.box {
    margin-top: 25px;
    padding: 20px;
    border-radius: 20px;
    background: white;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.price {
    font-size: 24px;
    font-weight: bold;
    color: #16a34a;
}
</style>
</head>

<body>

<h2>Price Checker BSD</h2>

<!-- MANUAL INPUT -->
<input type="text" id="manualInput" placeholder="Ketik kode barang">
<br>
<button onclick="searchManual()">Cek Manual</button>

<h3>ATAU SCAN BARCODE</h3>

<video id="video"></video>
<br>
<button onclick="startScan()">START SCAN</button>
<button onclick="stopScan()">STOP</button>

<div id="result"></div>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRQZFOJCGh_3gOGO_-an9e9lZWY_9JAl1f-MT8nnRcYB9kSnawD5tjJn9Qn6A_3NbcH0TFyuBCtWPgD/pub?gid=255796540&single=true&output=csv";

let data = [];
let codeReader = null;

// ================= LOAD DATA =================
async function loadData() {
    const response = await fetch(sheetURL);
    const csvText = await response.text();

    Papa.parse(csvText, {
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            data = results.data;
            console.log("Data Loaded:", data.length);
        }
    });
}

// ================= SHOW RESULT =================
function showResult(item) {

    const nama = item["Nama Barang"] || "-";
    const qty = item["Qty"] || "0";
    const jenis = item["Jenis Barang"] || "-";

    let hargaRaw = item["Harga"] || "0";
    hargaRaw = hargaRaw.toString().replace(/[^\d]/g, "");
    const harga = Number(hargaRaw) || 0;

    document.getElementById("result").innerHTML =
        `<div class="box">
            <h3>${nama}</h3>
            <p>Stok: ${qty} : ${jenis}</p>
            <div class="price">Rp ${harga.toLocaleString("id-ID")}</div>
        </div>`;
}

// ================= SEARCH =================
function searchProduct(code) {

    const product = data.find(item =>
        item["Kode Barang"] &&
        item["Kode Barang"].toString().trim() === code.toString().trim()
    );

    if (product) {
        showResult(product);
    } else {
        document.getElementById("result").innerHTML =
            "<div class='box'>❌ Produk tidak ditemukan</div>";
    }
}

function searchManual() {
    const code = document.getElementById("manualInput").value;
    searchProduct(code);
}

// ================= ZXING SCANNER =================
async function startScan() {

    codeReader = new ZXing.BrowserMultiFormatReader();

    const videoInputDevices = await codeReader.listVideoInputDevices();

    if (videoInputDevices.length === 0) {
        alert("Tidak ada kamera ditemukan");
        return;
    }

    const selectedDeviceId = videoInputDevices[0].deviceId;

    codeReader.decodeFromVideoDevice(selectedDeviceId, 'video', (result, err) => {
        if (result) {
            searchProduct(result.text);
        }
    });
}

function stopScan() {
    if (codeReader) {
        codeReader.reset();
    }
}

loadData();

</script>

</body>
</html>
