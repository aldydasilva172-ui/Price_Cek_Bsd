<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Price Checker BSD</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/@zxing/library@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
body{
font-family:'Segoe UI',sans-serif;
text-align:center;
padding:20px;
background:#f8fafc;
}

video{
width:100%;
max-width:220px;
border-radius:12px;
margin-top:10px;
}

input{
padding:12px;
width:90%;
max-width:320px;
border-radius:10px;
border:1px solid #ddd;
margin-top:15px;
}

button{
padding:10px 20px;
margin-top:10px;
border:none;
border-radius:20px;
background:#111827;
color:white;
cursor:pointer;
}

.box{
margin-top:20px;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.08);
}

.price{
font-size:26px;
font-weight:bold;
color:#16a34a;
}

.update{
font-size:14px;
color:#6b7280;
margin-top:8px;
}
</style>
</head>
<body>
<h2>PRICE CHECKER BSD NEW</h2>
<input id="manualInput" placeholder="Ketik kode barang">
<br>
<button onclick="searchManual()">Cek Manual</button>
<h3>SCAN BARCODE</h3>
<br>
<div id="result"></div>
<audio id="beep">
<source src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg">
</audio>
<script>

const sheetURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRQZFOJCGh_3gOGO_-an9e9lZWY_9JAl1f-MT8nnRcYB9kSnawD5tjJn9Qn6A_3NbcH0TFyuBCtWPgD/pub?gid=255796540&single=true&output=csv";

let data=[];
let codeReader;


// LOAD DATA
async function loadData(){

const res=await fetch(sheetURL);
const csv=await res.text();

Papa.parse(csv,{
header:true,
skipEmptyLines:true,
complete:function(results){

data=results.data;

}
});

}


// RESULT
function showResult(item){

const nama=item["Nama Barang"]||"-";
const qty=item["Qty"]||"0";
const jenis=item["Jenis Barang"]||"-";
const update=item["Update"]||"-";

let hargaRaw=item["Harga"]||"0";
hargaRaw=hargaRaw.toString().replace(/[^\d]/g,"");
const harga=Number(hargaRaw)||0;

document.getElementById("result").innerHTML=
`
<div class="box">
<h3>${nama}</h3>
<p>Stok: ${qty} : ${jenis}</p>
<div class="price">Rp ${harga.toLocaleString("id-ID")}</div>
<div class="update">Update: ${update}</div>
</div>
`;

}


// SEARCH
function searchProduct(code){

const product=data.find(item=>
item["Kode Barang"] &&
item["Kode Barang"].toString().trim()==code.toString().trim()
);

if(product){

document.getElementById("beep").play();

showResult(product);

}else{

document.getElementById("result").innerHTML=
"<div class='box'>❌ Produk tidak ditemukan</div>";

}

}


// MANUAL SEARCH
function searchManual(){

const code=document.getElementById("manualInput").value;

searchProduct(code);

}


// START CAMERA
async function startScan(){

codeReader=new ZXing.BrowserMultiFormatReader();

try{

await codeReader.decodeFromVideoDevice(null,'video',(result,err)=>{

if(result){

searchProduct(result.text);

stopScan();

}

});

}catch(err){

alert("Kamera tidak bisa dibuka");

}

}


// STOP CAMERA
function stopScan(){

if(codeReader){

codeReader.reset();

}

}


// LOAD DATA
loadData();

</script>
</body>
</html>
:::
