<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Price Check BSD</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f172a,#111827,#1e293b);
min-height:100vh;
padding:25px 15px;
color:white;
display:flex;
justify-content:center;
align-items:flex-start;
}

.container{
width:100%;
max-width:430px;
}

.header{
text-align:center;
margin-bottom:25px;
}

.logo{
width:75px;
height:75px;
border-radius:22px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
display:flex;
justify-content:center;
align-items:center;
font-size:34px;
margin:auto;
margin-bottom:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

h1{
font-size:28px;
font-weight:700;
letter-spacing:1px;
}

.subtitle{
margin-top:5px;
font-size:13px;
color:#cbd5e1;
}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(16px);
border:1px solid rgba(255,255,255,0.1);
border-radius:28px;
padding:22px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

.inputBox{
position:relative;
margin-bottom:8px;
}

.inputBox input{
width:100%;
padding:16px 18px;
border:none;
outline:none;
border-radius:18px;
background:rgba(255,255,255,0.08);
color:white;
font-size:16px;
font-family:'Poppins',sans-serif;
border:1px solid rgba(255,255,255,0.08);
transition:0.3s;
}

.inputBox input:focus{
border-color:#38bdf8;
box-shadow:0 0 0 4px rgba(56,189,248,0.15);
}

.inputBox input::placeholder{
color:#cbd5e1;
}

.suggestionsBox{
margin-top:8px;
background:rgba(255,255,255,0.08);
border-radius:16px;
overflow:hidden;
max-height:220px;
overflow-y:auto;
backdrop-filter:blur(12px);
}

.suggestionItem{
padding:12px 14px;
cursor:pointer;
border-bottom:1px solid rgba(255,255,255,0.06);
transition:0.2s;
}

.suggestionItem:hover{
background:rgba(255,255,255,0.1);
}

.suggestionCode{
font-size:13px;
font-weight:600;
color:#38bdf8;
}

.suggestionName{
font-size:13px;
color:#e2e8f0;
margin-top:2px;
}

.mainBtn{
width:100%;
padding:15px;
border:none;
border-radius:18px;
background:linear-gradient(135deg,#06b6d4,#3b82f6);
font-size:15px;
font-weight:600;
color:white;
cursor:pointer;
transition:0.3s;
margin-top:12px;
}

.mainBtn:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(59,130,246,0.3);
}

.orText{
text-align:center;
margin:18px 0;
font-size:13px;
color:#cbd5e1;
letter-spacing:1px;
}

@keyframes scan{
0%{top:10px;}
50%{top:85%;}

100%{top:10px;}
}

.scanButtons{
display:flex;
gap:10px;
margin-top:15px;
}

.scanButtons button{
flex:1;
padding:14px;
border:none;
border-radius:16px;
font-weight:600;
cursor:pointer;
font-family:'Poppins',sans-serif;
transition:0.3s;
}

.startBtn{
background:#10b981;
color:white;
}

.stopBtn{
background:#ef4444;
color:white;
}

.scanButtons button:hover{
transform:translateY(-2px);
}

.resultCard{
margin-top:22px;
padding:22px;
border-radius:24px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.1);
animation:fade 0.3s ease;

/* CENTRING FIX */
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

.productName{
font-size:22px;
font-weight:700;
margin-bottom:8px;
text-align:center;
}

.info{
font-size:14px;
color:#cbd5e1;
margin-bottom:15px;
text-align:center;
}

.price{
font-size:34px;
font-weight:700;
color:#22c55e;
margin-bottom:10px;
text-align:center;
}

.update{
font-size:11px;
color:#94a3b8;
text-align:center;
}

.notFound{
margin-top:20px;
padding:20px;
border-radius:20px;
background:rgba(239,68,68,0.15);
border:1px solid rgba(239,68,68,0.3);
font-weight:500;
text-align:center;
}

.loading{
margin-top:15px;
font-size:13px;
color:#cbd5e1;
}

.footer{
margin-top:25px;
text-align:center;
font-size:11px;
color:#94a3b8;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="logo">🛒</div>
<h1>PRICE CHECKER</h1>
<div class="subtitle">BSD Smart Price Scanner</div>
</div>

<div class="card">

<div class="inputBox">
<input id="manualInput" placeholder="Ketik barcode atau nama barang">
</div>

<div id="suggestions" class="suggestionsBox"></div>

<button class="mainBtn" onclick="searchManual()">
CEK HARGA
</button>

<div class="orText">
SCAN BARCODE
</div>



<div class="scanButtons">
<button class="startBtn" onclick="startScan()">START SCAN</button>
<button class="stopBtn" onclick="stopScan()">STOP</button>
</div>

<div class="loading" id="loading">
Loading database...
</div>

<div id="result"></div>

</div>

<div class="footer">
PRICE CHECKER BSD © 2026
</div>

</div>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vRQZFOJCGh_3gOGO_-an9e9lZWY_9JAl1f-MT8nnRcYB9kSnawD5tjJn9Qn6A_3NbcH0TFyuBCtWPgD/pub?gid=255796540&single=true&output=csv";

let data = [];
let suggestionData = [];
let productMap = {};
let codeReader;

async function loadData(){
try{
const res = await fetch(sheetURL);
const csv = await res.text();

Papa.parse(csv,{
header:true,
skipEmptyLines:true,
complete:(results)=>{

data = results.data;

suggestionData = results.data.map(item => ({
kode: item["Kode Barang"] || "",
nama: item["Nama Barang"] || ""
}));

data.forEach(item=>{
const key = item["Kode Barang"]?.toString().trim().toLowerCase();
if(key){
productMap[key] = item;
}
});

document.getElementById("loading").innerHTML =
`✅ ${data.length} produk berhasil dimuat`;

setTimeout(()=>{
document.getElementById("loading").style.display="none";
},1500);

}
});

}catch(err){
document.getElementById("loading").innerHTML =
"❌ Gagal memuat database";
}
}

function showResult(item){

const nama = item["Nama Barang"] || "-";
const qty = item["Qty"] || "0";
const jenis = item["Jenis Barang"] || "-";

let harga = item["Harga"] || "0";
harga = harga.toString().replace(/[^\d]/g,"");

const finalHarga = Number(harga || 0);
const update = item["Update"] || "-";

document.getElementById("result").innerHTML = `
<div class="resultCard">

<div class="productName">${nama}</div>

<div class="info">
Stok : ${qty} • ${jenis}
</div>

<div class="price">
Rp ${finalHarga.toLocaleString("id-ID")}
</div>

<div class="update">
Update terakhir : ${update}
</div>

</div>`;
}

function searchProduct(code){
if(!code) return;

const normalized = code.toString().trim().toLowerCase();

let product = productMap[normalized];

if(!product){
product = data.find(item =>
item["Nama Barang"]?.toString().toLowerCase().includes(normalized)
);
}

if(product){
showResult(product);
}else{
document.getElementById("result").innerHTML =
`<div class="notFound">❌ Produk tidak ditemukan</div>`;
}
}

function searchManual(){
const code = document.getElementById("manualInput").value.trim();
searchProduct(code);
}

function showSuggestions(keyword){
const box = document.getElementById("suggestions");

if(!keyword){
box.innerHTML = "";
return;
}

const results = suggestionData.filter(item =>
item.kode.toLowerCase().includes(keyword.toLowerCase()) ||
item.nama.toLowerCase().includes(keyword.toLowerCase())
).slice(0,10);

if(results.length === 0){
box.innerHTML = "";
return;
}

box.innerHTML = results.map(item => `
<div class="suggestionItem" onclick="selectSuggestion('${item.kode}')">
<div class="suggestionCode">${item.kode}</div>
<div class="suggestionName">${item.nama}</div>
</div>
`).join("");
}

function selectSuggestion(kode){
document.getElementById("manualInput").value = kode;
document.getElementById("suggestions").innerHTML = "";
searchProduct(kode);
}

let typingTimer;

document.getElementById("manualInput").addEventListener("input",function(){
clearTimeout(typingTimer);
typingTimer = setTimeout(()=>showSuggestions(this.value),150);
});

document.getElementById("manualInput").addEventListener("keypress",function(e){
if(e.key==="Enter"){
searchManual();
document.getElementById("suggestions").innerHTML = "";
}
});

function startScan(){
window.__scanned = false;

codeReader = new ZXing.BrowserMultiFormatReader();

codeReader.decodeFromConstraints({
video:{
facingMode:{ ideal:"environment" },
width:{ ideal:1280 },
height:{ ideal:720 }
}
},"video",(result)=>{

if(result && !window.__scanned){
window.__scanned = true;

const code = result.text;
document.getElementById("manualInput").value = code;
searchProduct(code);

navigator.vibrate?.(150);
stopScan();
}
});
}

function stopScan(){
if(codeReader){
codeReader.reset();

const video = document.getElementById("video");
if(video.srcObject){
video.srcObject.getTracks().forEach(t=>t.stop());
video.srcObject = null;
}
}
}

loadData();

</script>

</body>
</html>
