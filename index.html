<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Price Checker BSD</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
padding:20px;
background:#f1f5f9;
}

h2{
margin-bottom:5px;
}

video{
width:260px;
border-radius:12px;
margin-top:10px;
}

input{
padding:12px;
width:90%;
max-width:320px;
border-radius:10px;
border:1px solid #ddd;
margin-top:15px;
}

button{
padding:12px 20px;
border:none;
border-radius:25px;
background:#0f172a;
color:white;
margin-top:10px;
cursor:pointer;
}

.box{
margin-top:20px;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.price{
font-size:28px;
font-weight:bold;
color:#16a34a;
}

.update{
font-size:8px;
color:#6b7280;
}

</style>

</head>

<body>

<h2>PRICE CHECKER BSD NEW</h2>

<input id="manualInput" placeholder="Ketik kode barang">
<br>
<button onclick="searchManual()">Cek Manual</button>

<h3>ATAU SCAN BARCODE</h3>

<video id="video"></video>
<br>
<button onclick="startScan()">START SCAN</button>
<button onclick="stopScan()">STOP</button>

<div id="result"></div>

<script>

const sheetURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRQZFOJCGh_3gOGO_-an9e9lZWY_9JAl1f-MT8nnRcYB9kSnawD5tjJn9Qn6A_3NbcH0TFyuBCtWPgD/pub?gid=255796540&single=true&output=csv";

let data=[];
let codeReader;


// LOAD DATA
async function loadData(){

const res=await fetch(sheetURL);
const csv=await res.text();

Papa.parse(csv,{
header:true,
skipEmptyLines:true,
complete:(results)=>{
data=results.data;
}
});

}


// SHOW RESULT
function showResult(item){

const nama=item["Nama Barang"]||"-";
const qty=item["Qty"]||"0";
const jenis=item["Jenis Barang"]||"-";

let harga=item["Harga"]||"0";
harga=harga.toString().replace(/[^\d]/g,"");

const update=item["Update"]||"-";

document.getElementById("result").innerHTML=
`
<div class="box">
<h3>${nama}</h3>
<p>Stok: ${qty} : ${jenis}</p>
<div class="price">Rp ${Number(harga).toLocaleString("id-ID")}</div>
<p>Update: ${update}</p>
</div>
`;
}


// SEARCH
function searchProduct(code){

const product=data.find(item=>
item["Kode Barang"] &&
item["Kode Barang"].toString().trim()===code.toString().trim()
);

if(product){

showResult(product);

}else{

document.getElementById("result").innerHTML=
"<div class='box'>❌ Produk tidak ditemukan</div>";

}

}


function searchManual(){

const code=document.getElementById("manualInput").value;

searchProduct(code);

}


// START SCAN
function startScan(){

codeReader=new ZXing.BrowserMultiFormatReader();

codeReader.decodeFromConstraints({

video:{
facingMode:{ exact:"environment" }
}

}, "video", (result,err)=>{

if(result){

const code=result.text;

document.getElementById("manualInput").value=code;

searchProduct(code);

stopScan();

}

});

}


// STOP CAMERA
function stopScan(){

if(codeReader){

codeReader.reset();

const video=document.getElementById("video");

if(video.srcObject){

video.srcObject.getTracks().forEach(track=>track.stop());

video.srcObject=null;

}

}

}


loadData();

</script>

</body>
</html>
