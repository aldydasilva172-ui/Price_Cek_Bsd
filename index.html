<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Price Checker BSD PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    padding: 20px;
    background: #f8fafc;
    color: #1f2937;
}

h2 { margin-bottom: 20px; }

#reader {
    width: 100%;
    max-width: 380px;
    margin: auto;
}

input {
    padding: 14px;
    width: 85%;
    max-width: 320px;
    border-radius: 14px;
    border: 1px solid #e5e7eb;
    font-size: 16px;
    background: white;
}

button {
    padding: 12px 25px;
    margin-top: 15px;
    border-radius: 30px;
    border: none;
    background: #111827;
    color: white;
    font-weight: 500;
    cursor: pointer;
}

.box {
    margin-top: 25px;
    padding: 25px;
    border-radius: 20px;
    background: white;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.price {
    font-size: 26px;
    font-weight: 700;
    color: #16a34a;
    margin-top: 10px;
}
</style>
</head>

<body>

<h2>Price Checker BSD Joss</h2>

<!-- MANUAL INPUT -->
<input type="text" id="manualInput" placeholder="Ketik kode barang">
<br>
<button onclick="searchManual()">Cek Manual</button>

<h3>ATAU SCAN BARCODE</h3>

<div id="reader"></div>
<br>
<button onclick="startScanner()">START SCAN</button>
<button onclick="stopScanner()">STOP</button>

<div id="result"></div>

<audio id="beep" preload="auto">
<source src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg">
</audio>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRQZFOJCGh_3gOGO_-an9e9lZWY_9JAl1f-MT8nnRcYB9kSnawD5tjJn9Qn6A_3NbcH0TFyuBCtWPgD/pub?gid=255796540&single=true&output=csv";

let data = [];
let html5QrCode;
let lastScan = "";

// LOAD DATA
async function loadData() {
    const response = await fetch(sheetURL);
    const csvText = await response.text();

    Papa.parse(csvText, {
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            data = results.data;
        }
    });
}

// SHOW RESULT
function showResult(item) {

    const nama = item["Nama Barang"] || "-";
    const qty = item["Qty"] || "0";

    let hargaRaw = item["Harga"] || "0";
    hargaRaw = hargaRaw.toString().replace(/[^\d]/g, "");
    const harga = Number(hargaRaw) || 0;

    document.getElementById("result").innerHTML =
        `<div class="box">
            <h3>${nama}</h3>
            <p>Stok: ${qty}</p>
            <div class="price">Rp ${harga.toLocaleString("id-ID")}</div>
        </div>`;
}

// SEARCH
function searchProduct(code) {

    const product = data.find(item =>
        item["Kode Barang"] &&
        item["Kode Barang"].toString().trim() === code.toString().trim()
    );

    if (product) {
        showResult(product);
    } else {
        document.getElementById("result").innerHTML =
            "<div class='box'>❌ Produk tidak ditemukan</div>";
    }
}

// MANUAL
function searchManual() {
    const code = document.getElementById("manualInput").value;
    searchProduct(code);
}

// START SCANNER
function startScanner() {

    html5QrCode = new Html5Qrcode("reader");

    html5QrCode.start(
        { facingMode: "environment" },
        {
            fps: 20,
            qrbox: { width: 320, height: 160 },
            aspectRatio: 1.777,
            disableFlip: true,
            formatsToSupport: Object.values(Html5QrcodeSupportedFormats),
            experimentalFeatures: {
                useBarCodeDetectorIfSupported: true
            }
        },
        (decodedText) => {

            if (decodedText !== lastScan) {

                lastScan = decodedText;

                document.getElementById("beep").play();
                navigator.vibrate?.(100);

                searchProduct(decodedText);

                setTimeout(() => {
                    lastScan = "";
                }, 1500);
            }
        }
    );
}

// STOP
function stopScanner() {
    if (html5QrCode) {
        html5QrCode.stop().then(() => {
            html5QrCode.clear();
        });
    }
}

loadData();

</script>

</body>
</html>
